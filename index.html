<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Cadastro de Imóveis</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/forms.css">

</head>

<body>

<div class="container">

    <header class="topbar">

        <div class="logo">
            Sistema de Cadastro de Imóveis
        </div>

        <div class="actions">

            <button id="btnNovo">
                Novo Imóvel
            </button>

            <button id="btnAtualizar">
                Atualizar
            </button>

        </div>

    </header>

    <section class="card">

        <h2>Pesquisa de Imóveis</h2>

        <div class="grid-filtros">

            <div class="campo">
                <label>Código do Imóvel</label>
                <input
                    type="text"
                    id="txtCodigo"
                    placeholder="Digite o código">
            </div>

            <div class="campo">
                <label>Inscrição Municipal</label>
                <input
                    type="text"
                    id="txtInscricao">
            </div>

            <div class="campo">
                <label>Tipo Logradouro</label>
                <input
                    type="text"
                    id="txtTipoLogradouro">
            </div>

            <div class="campo campo-grande">
                <label>Logradouro</label>
                <input
                    type="text"
                    id="txtLogradouro">
            </div>

            <div class="campo">
                <label>Quadra</label>
                <input
                    type="text"
                    id="txtQuadra">
            </div>

            <div class="campo">
                <label>Lote</label>
                <input
                    type="text"
                    id="txtLote">
            </div>

        </div>

        <div class="toolbar">

            <button id="btnPesquisar">
                Pesquisar
            </button>

            <button id="btnLimpar">
                Limpar
            </button>

        </div>

    </section>

    <section class="card">

        <div class="table-header">

            <h2>Resultado da Pesquisa</h2>

            <span id="lblQuantidade">
                0 imóveis encontrados
            </span>

        </div>

        <table id="tblImoveis">

            <thead>

                <tr>

                    <th>Código</th>

                    <th>Inscrição</th>

                    <th>Tipo</th>

                    <th>Logradouro</th>

                    <th>Quadra</th>

                    <th>Lote</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="tbResultado">

                <!-- preenchido via JavaScript -->

            </tbody>

        </table>

        <div id="semResultado" class="empty">

            <h3>Nenhum imóvel encontrado</h3>

            <p>
                Clique abaixo para realizar um novo cadastro.
            </p>

            <button id="btnCadastrar">

                Cadastrar Novo Imóvel

            </button>

        </div>

    </section>

</div>

<script src="js/banco.js"></script>
<script src="js/util.js"></script>
<script src="js/pesquisa.js"></script>
<script src="js/app.js"></script>

</body>

</html>
