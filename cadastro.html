<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Imóvel</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/forms.css">

</head>

<body>

<div class="container">

    <header class="topbar">

        <div class="logo">

            Cadastro / Alteração de Imóvel

        </div>

        <div class="actions">

            <button
                class="btn-secondary"
                id="btnVoltar">

                Voltar

            </button>

            <button
                class="btn-primary"
                id="btnSalvar">

                Salvar

            </button>

        </div>

    </header>

    <div
        class="alert alert-success"
        id="msgSucesso">

        Cadastro salvo com sucesso.

    </div>

    <div
        class="alert alert-error"
        id="msgErro">

    </div>

    <form id="frmCadastro">

        <!-- ============================================ -->

        <!-- DADOS CADASTRAIS -->

        <!-- ============================================ -->

        <section class="form-section">

            <h3>

                Dados Cadastrais

            </h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>

                        Código do Imóvel

                    </label>

                    <input
                        id="codigo"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group">

                    <label>

                        Inscrição Municipal

                    </label>

                    <input
                        id="inscricao"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group">

                    <label>

                        Tipo de Logradouro

                    </label>

                    <input
                        id="tipoLogradouro"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group full">

                    <label>

                        Logradouro

                    </label>

                    <input
                        id="logradouro"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group">

                    <label>

                        Quadra

                    </label>

                    <input
                        id="quadra"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group">

                    <label>

                        Lote

                    </label>

                    <input
                        id="lote"
                        class="readonly"
                        readonly>

                </div>

                <div class="form-group full">

                    <label class="required">

                        Loteamento

                    </label>

                    <input
                        id="loteamento"
                        maxlength="120">

                </div>

            </div>

        </section>

                <section class="form-section">

            <h3>Dados da Planta de Valores</h3>

            <div class="form-grid-4">

                <div class="form-group">
                    <label class="required">Área Construída</label>
                    <input
                        type="number"
                        id="areaConstruida"
                        step="0.01">
                </div>

                <div class="form-group">
                    <label class="required">Área do Terreno</label>
                    <input
                        type="number"
                        id="areaTerreno"
                        step="0.01">
                </div>

                <div class="form-group">
                    <label>Fluxo da Via</label>
                    <select id="fluxoVia"></select>
                </div>

                <div class="form-group">
                    <label>Idade Aparente</label>
                    <select id="idadeAparente"></select>
                </div>

                <div class="form-group">
                    <label>Andar</label>
                    <input
                        type="number"
                        id="andar">
                </div>

                <div class="form-group">
                    <label>Pavimentos</label>
                    <input
                        type="number"
                        id="pavimentos">
                </div>

                <div class="form-group">
                    <label>Elevador</label>
                    <select id="elevador"></select>
                </div>

                <div class="form-group">
                    <label>Topografia</label>
                    <select id="topografia"></select>
                </div>

                <div class="form-group">
                    <label>Esquina</label>
                    <select id="esquina"></select>
                </div>

                <div class="form-group">
                    <label>Muro</label>
                    <select id="muro"></select>
                </div>

                <div class="form-group">
                    <label>Distância da Portaria</label>
                    <select id="distanciaPortaria"></select>
                </div>

                <div class="form-group">
                    <label>Área de Lazer</label>
                    <select id="areaLazer"></select>
                </div>

                <div class="form-group">
                    <label>Situação</label>
                    <select id="situacao"></select>
                </div>

                <div class="form-group">
                    <label>Benfeitoria</label>
                    <select id="benfeitoria"></select>
                </div>

                <div class="form-group">
                    <label>Distância (Km)</label>
                    <input
                        type="number"
                        step="0.01"
                        id="distanciaKm">
                </div>

                <div class="form-group">
                    <label>Margem</label>
                    <select id="margem"></select>
                </div>

                <div class="form-group">
                    <label>Segurança</label>
                    <select id="seguranca"></select>
                </div>

                <div class="form-group">
                    <label>Infraestrutura</label>
                    <select id="infraestrutura"></select>
                </div>

                <div class="form-group">
                    <label>Índice</label>
                    <input
                        type="number"
                        step="0.0001"
                        id="indice">
                </div>

            </div>

        </section>
                <!-- ============================================ -->
        <!-- BOTÕES -->
        <!-- ============================================ -->

        <div class="form-buttons">

            <button
                type="button"
                class="btn-secondary"
                id="btnCancelar">

                Cancelar

            </button>

            <button
                type="button"
                class="btn-secondary"
                id="btnLimparFormulario">

                Limpar

            </button>

            <button
                type="submit"
                class="btn-success"
                id="btnSalvarFormulario">

                Salvar Alterações

            </button>

        </div>

    </form>

</div>

<!-- ===================================================== -->
<!-- MODAL DE CONFIRMAÇÃO -->
<!-- ===================================================== -->

<div
    id="modalConfirmacao"
    class="modal">

    <div class="modal-content">

        <h2>

            Confirmação

        </h2>

        <p>

            Existem alterações não salvas.

            Deseja realmente sair?

        </p>

        <div class="modal-buttons">

            <button
                id="btnModalCancelar"
                class="btn-secondary">

                Continuar Editando

            </button>

            <button
                id="btnModalConfirmar"
                class="btn-danger">

                Sair sem Salvar

            </button>

        </div>

    </div>

</div>

<!-- ===================================================== -->
<!-- LOADING -->
<!-- ===================================================== -->

<div
    class="loading-overlay"
    id="loading">

    <div class="spinner"></div>

</div>

<!-- ===================================================== -->
<!-- SCRIPTS -->
<!-- ===================================================== -->

<script src="js/banco.js"></script>

<script src="js/util.js"></script>

<script src="js/validacoes.js"></script>

<script src="js/cadastro.js"></script>

<script src="js/app.js"></script>

</body>

</html>
